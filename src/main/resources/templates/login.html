<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude Web &mdash; Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .card {
      background: #171717;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #fafafa;
    }

    label {
      display: block;
      font-size: .875rem;
      color: #a3a3a3;
      margin-bottom: .5rem;
    }

    input {
      width: 100%;
      padding: .625rem .75rem;
      background: #0a0a0a;
      border: 1px solid #404040;
      border-radius: 8px;
      color: #fafafa;
      font-size: 1rem;
      outline: none;
      transition: border-color .15s;
    }

    input:focus {
      border-color: #3b82f6;
    }

    button {
      width: 100%;
      padding: .625rem;
      margin-top: 1rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }

    button:hover {
      background: #2563eb;
    }

    .error {
      color: #ef4444;
      font-size: .8125rem;
      margin-top: .75rem;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Claude Web</h1>
    <form id="f">
      <label for="pw">Password</label>
      <input id="pw" name="password" type="password" autocomplete="current-password" autofocus required>
      <button type="submit">Sign in</button>
      <p class="error" id="err">Incorrect password</p>
    </form>
  </div>

  <script>
    const form = document.getElementById('f');
    const errEl = document.getElementById('err');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errEl.style.display = 'none';

      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          password: document.getElementById('pw').value
        })
      });

      if (res.ok) {
        window.location.href = '/';
      } else {
        errEl.style.display = 'block';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    });
  </script>
</body>
</html>
