<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSE Stream Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    .container {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 24px;
    }
    h1 {
      margin-bottom: 24px;
      color: #fff;
    }
    .input-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #a0a0a0;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      background: #1a1a1a;
      border: 1px solid #404040;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
      font-family: monospace;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #2563eb;
    }
    button:disabled {
      background: #404040;
      cursor: not-allowed;
    }
    .output {
      margin-top: 24px;
      padding: 16px;
      background: #1a1a1a;
      border-radius: 8px;
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .output .event {
      margin-bottom: 8px;
      padding: 8px;
      background: #2a2a2a;
      border-radius: 4px;
    }
    .output .event.method {
      font-weight: bold;
      color: #3b82f6;
    }
    .output .event.stream_delta {
      color: #22c55e;
    }
    .output .event.complete {
      color: #f59e0b;
    }
    .output .event.error {
      color: #ef4444;
    }
    .stats {
      margin-top: 16px;
      font-size: 12px;
      color: #808080;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SSE Stream Test</h1>
    
    <div class="input-group">
      <label for="sessionId">Session ID (optional):</label>
      <input type="text" id="sessionId" placeholder="Leave empty to create new session">
    </div>
    
    <div class="input-group">
      <label for="message">Message:</label>
      <textarea id="message" placeholder="Enter your message...">Say hello in 3 words</textarea>
    </div>
    
    <button id="sendBtn" onclick="sendMessage()">Send</button>
    
    <div class="output" id="output"></div>
    
    <div class="stats" id="stats"></div>
  </div>

  <script>
    let eventCount = 0;
    let startTime = 0;
    let lastChunkTime = 0;

    function log(message, type = '') {
      const output = document.getElementById('output');
      const div = document.createElement('div');
      div.className = 'event ' + type;
      div.textContent = message;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
      
      const now = Date.now();
      if (eventCount === 0) startTime = now;
      lastChunkTime = now;
      eventCount++;
      
      updateStats();
    }

    function updateStats() {
      const stats = document.getElementById('stats');
      const elapsed = lastChunkTime - startTime;
      stats.textContent = `Events: ${eventCount} | Time: ${elapsed}ms | Rate: ${eventCount > 0 ? (elapsed / eventCount).toFixed(1) : 0}ms/event`;
    }

    async function sendMessage() {
      const btn = document.getElementById('sendBtn');
      const sessionId = document.getElementById('sessionId').value;
      const message = document.getElementById('message').value;

      if (!message.trim()) {
        alert('Please enter a message');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';

      const output = document.getElementById('output');
      output.innerHTML = '';
      eventCount = 0;

      const body = {
        text: message
      };
      if (sessionId) {
        body.sessionId = sessionId;
      }

      log('Request: ' + JSON.stringify(body, null, 2), '');
      log('---', '');

      try {
        const response = await fetch('/api/claude/v2/sendMessageStream', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });

        log('Response status: ' + response.status, '');

        if (!response.ok) {
          const error = await response.text();
          log('Error: ' + error, 'error');
          btn.disabled = false;
          btn.textContent = 'Send';
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                log('Event: ' + JSON.stringify(data), data.method || '');
              } catch (e) {
                if (line.trim()) {
                  log('Raw: ' + line, '');
                }
              }
            } else if (line.trim() && !line.startsWith(':')) {
              log('Raw: ' + line, '');
            }
          }
        }

        if (buffer.trim()) {
          if (buffer.startsWith('data: ')) {
            try {
              const data = JSON.parse(buffer.slice(6));
              log('Final: ' + JSON.stringify(data), data.method || '');
            } catch (e) {
              log('Final Raw: ' + buffer, '');
            }
          } else {
            log('Final: ' + buffer, '');
          }
        }

        log('=== Stream Complete ===', 'complete');

      } catch (error) {
        log('Error: ' + error.message, 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Send';
      updateStats();
    }
  </script>
</body>
</html>
